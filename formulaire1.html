<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <h2>Formulaire d'inscription</h2>
    <form id="Inscription">
        <label>Nom :</label><br>
        <input type="text" id="nom" name="nom">
        <span id="err-nom"></span><br><br>
        <label>Prénom :</label><br>
        <input type="text" id="prenom" name="prenom">
        <span id="err-prenom"></span><br><br>
        <label>Email :</label><br>
        <input type="email" id="email" name="email">
        <span id="err-email"></span><br><br>
        <label>Mot de passe :</label><br>
        <input type="password" id="password" name="password">
        <span id="err-password"></span><br><br>
        <label>Date de naissance :</label><br>
        <input type="date" id="date" name="date">
        <span id="err-date"></span><br><br>
        <label>Genre :</label><br>
        <input type="radio" name="genre" value="Homme"> Homme
        <input type="radio" name="genre" value="Femme"> Femme
        <span id="err-genre"></span><br><br>
        <label>Ville :</label><br>
        <select id="ville" name="ville">
            <option value="">-- Choisir une ville --</option>
            <option value="Marrakech">Marrakech</option>
            <option value="Casablanca">Casablanca</option>
            <option value="Rabat">Rabat</option>
        </select>
        <span id="err-ville"></span><br><br>
        <label>
            <input type="checkbox" id="conditions" name="conditions">
            J'accepte les conditions
        </label>
        <span id="err-conditions"></span><br><br>
        <button type="submit">S'inscrire</button>
        <button type="reset">Annuler</button>
    </form>
<h3>Informations saisies :</h3>
<div id="resultat"></div>
<table border="1">
     <thead>
        <tr>
            <th>Nom</th>
            <th>Prenom</th>
            <th>Email</th>
            <th>Date de naissance</th>
        </tr>
     </thead>
     <tbody id="tbody"></tbody>
</table>
<script src="inscription.js"></script>
</body>
</html>
